name: Update market dashboard data

on:
  schedule:
    # Every Monday 03:00 KST.
    - cron: '0 18 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate market dashboard JSON
        run: node scripts/update-market-data.js
        env:
          REB_API_KEY: ${{ secrets.REB_API_KEY }}

      - name: Commit updated market data
        run: |
          if git diff --quiet -- data/market-dashboard.json; then
            echo "No market data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market-dashboard.json
          git commit -m "Update market dashboard data"
          git push origin HEAD:dev
