name: Update apartment trade data

on:
  schedule:
    # Every day 04:00 KST.
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate apartment trade summary JSON
        run: node scripts/update-apt-trades.js
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}

      - name: Commit updated apartment trade data
        run: |
          if git diff --quiet -- data/apt-trades-summary.json; then
            echo "No apartment trade data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/apt-trades-summary.json
          git commit -m "Update apartment trade data"
          git push origin HEAD:dev
