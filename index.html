<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORS 테스트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: #fff;
  }
  .card {
    background: #1c1c1e;
    border: 1px solid #2c2c2e;
    border-radius: 20px;
    padding: 40px 32px;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  h1 { font-size: 18px; font-weight: 600; color: #fff; }
  .url {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    word-break: break-all;
    line-height: 1.6;
    background: #111;
    padding: 10px 14px;
    border-radius: 10px;
  }
  button {
    width: 100%;
    height: 52px;
    background: #0a84ff;
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:active { opacity: 0.7; }
  button:disabled { opacity: 0.4; cursor: default; }
  #result {
    font-size: 14px;
    line-height: 1.6;
    min-height: 40px;
    text-align: center;
    color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
<div class="card">
  <h1>🔍 CORS 테스트</h1>
  <div class="url">https://www.reb.or.kr/r-one/openapi/SttsApiTblData.do?KEY=011e9c482bc2432198b0ac0a8cec2f1b&Type=json&pIndex=1&pSize=3&STATBL_ID=A_2024_00016&DTACYCLE_CD=MM</div>
  <button id="btn" onclick="runTest()">테스트 시작</button>
  <div id="result">버튼을 누르면 결과가 표시돼요</div>
</div>

<script>
  async function runTest() {
    const btn = document.getElementById('btn');
    const result = document.getElementById('result');

    btn.disabled = true;
    btn.textContent = '테스트 중...';
    result.style.color = 'rgba(255,255,255,0.4)';
    result.textContent = '요청 보내는 중...';

    try {
      const res = await fetch('https://www.reb.or.kr/r-one/openapi/SttsApiTblData.do?KEY=011e9c482bc2432198b0ac0a8cec2f1b&Type=json&pIndex=1&pSize=3&STATBL_ID=A_2024_00016&DTACYCLE_CD=MM');
      const data = await res.json();
      result.style.color = '#30d158';
      result.textContent = '✅ CORS 허용! 브라우저에서 바로 연동 가능해요.';
    } catch (e) {
      result.style.color = '#ff453a';
      result.textContent = '❌ CORS 차단 → Netlify Functions 프록시 필요\n' + e.message;
    } finally {
      btn.disabled = false;
      btn.textContent = '다시 테스트';
    }
  }
</script>
</body>
</html>
